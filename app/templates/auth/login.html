{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="auth-card card">
            <div class="card-header">
                <i class="bi bi-cup-hot-fill" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
                <h4>Chào mừng trở lại</h4>
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 0; font-family: Inter, sans-serif; font-size: 0.9rem;">Đăng nhập để tiếp tục</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Tên đăng nhập
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Mật khẩu
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p class="text-muted mb-0">Chưa có tài khoản? <a href="{{ url_for('auth.register') }}" style="font-weight: 600;">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
