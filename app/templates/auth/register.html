{% extends "base.html" %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="auth-card card" style="max-width: 550px;">
            <div class="card-header">
                <i class="bi bi-person-plus-fill" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
                <h4>Tạo tài khoản mới</h4>
                <p style="color: rgba(255,255,255,0.7); margin-bottom: 0; font-family: Inter, sans-serif; font-size: 0.9rem;">Đăng ký để bắt đầu đặt hàng</p>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="username" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="nguyenvana@gmail.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Họ và tên</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="0901234567">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Xác nhận <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>
                    <div class="d-grid mt-2">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-person-plus"></i> Đăng ký
                        </button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p class="text-muted mb-0">Đã có tài khoản? <a href="{{ url_for('auth.login') }}" style="font-weight: 600;">Đăng nhập ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
